# Production nginx — used by docker-compose.prod.yml. Proxies to the api
# compose service by name. Cert paths assume host-side certbot at /etc/letsencrypt.

# Per-IP rate-limit floor. MUST live in the http context (this file is included
# inside http{}), NOT inside a server block. Per-API-key limiting is done in the
# Conduit middleware; this is a coarse cross-worker/per-IP safety net.
limit_req_zone $binary_remote_addr zone=conduit_api:10m rate=20r/s;

# HTTP → HTTPS redirect, with a /.well-known/acme-challenge path so certbot can
# issue AND renew via the webroot while nginx stays up.
server {
    listen 80;
    server_name api.conduit.energy;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS terminating proxy.
server {
    listen 443 ssl;
    http2 on;
    server_name api.conduit.energy;

    ssl_certificate     /etc/letsencrypt/live/api.conduit.energy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.conduit.energy/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers (inherited by the location block, which sets none of its own).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;

    client_max_body_size 1m;

    location / {
        limit_req zone=conduit_api burst=80 nodelay;

        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;

        # Long-lived streaming responses (LND subscribe-style endpoints): keep alive.
        proxy_buffering off;
    }
}
