name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  core:
    name: core (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    defaults:
      run:
        working-directory: core

    env:
      CONDUIT_ENV: development
      CONDUIT_NETWORK: testnet
      LND_MOCK: "true"
      BOOTSTRAP_API_KEY: ck_test_ci_root
      API_SECRET_KEY: ci-test-secret-key
      RATE_LIMIT_PER_MINUTE: "100000"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check conduit_core alembic tests

      - name: Tests (pytest)
        # No DATABASE_URL override: the test suite provisions its own temp-file
        # SQLite (see tests/conftest.py). A file DB — unlike `:memory:` — gives
        # each session a real connection sharing committed data, which the
        # idempotency-reservation concurrency test depends on.
        run: pytest -x -q

      - name: Migrations match models (alembic check)
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./ci_alembic_check.db"
        run: |
          alembic upgrade head
          alembic check

  core-postgres:
    name: core (postgres)
    runs-on: ubuntu-latest

    # Real Postgres catches the timezone-aware vs -naive class of bug that
    # SQLite silently tolerates (which is how the auth/reconciler/policy
    # timezone bug shipped green on the SQLite-only suite).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
          POSTGRES_DB: conduit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conduit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    defaults:
      run:
        working-directory: core

    env:
      CONDUIT_ENV: development
      CONDUIT_NETWORK: testnet
      LND_MOCK: "true"
      BOOTSTRAP_API_KEY: ck_test_ci_root
      API_SECRET_KEY: ci-test-secret-key
      RATE_LIMIT_PER_MINUTE: "100000"
      DATABASE_URL: "postgresql+asyncpg://conduit:conduit@localhost:5432/conduit_test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Migrations on Postgres (upgrade + check)
        run: |
          alembic upgrade head
          alembic check

      - name: Tests (pytest on Postgres)
        run: pytest -x -q

  sdk-python:
    name: sdk-python (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    defaults:
      run:
        working-directory: sdk-python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -x -q

  security-audit:
    name: security-audit (advisory)
    runs-on: ubuntu-latest
    # Advisory only — surfaces known-vulnerable deps without blocking merges, so a
    # transitive CVE doesn't wedge the pipeline. Triage via the job summary.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: pip-audit (core)
        continue-on-error: true
        working-directory: core
        run: |
          pip install pip-audit
          pip install -e .
          pip-audit --desc

      - name: npm audit (sdk-js)
        continue-on-error: true
        working-directory: sdk-js
        run: npm audit --audit-level=high || true

      - name: npm audit (dashboard)
        continue-on-error: true
        working-directory: dashboard
        run: npm audit --audit-level=high || true

  sdk-js:
    name: sdk-js (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    defaults:
      run:
        working-directory: sdk-js

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

      - name: Tests (node --test)
        run: npm test

  docker:
    name: docker (ghcr push)
    runs-on: ubuntu-latest
    # Only publish images for release tags (v*). Pushes/PRs to main skip this.
    if: startsWith(github.ref, 'refs/tags/v')

    # Required to push the image to the GitHub Container Registry (ghcr.io).
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./core
          push: true
          tags: |
            ghcr.io/jake1848/conduit:${{ github.ref_name }}
            ghcr.io/jake1848/conduit:latest
